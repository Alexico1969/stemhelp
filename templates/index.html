<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Help</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='img/banner.jpg') }}" alt="Banner" class="banner">
        </header>

        <main class="flow-main">
            <section class="flow-card">
                <h1>Start Your Help Session</h1>
                <p class="flow-subtitle">So.. what Unit are you working in?</p>
                <div class="choice-grid" id="chapterGrid">
                    <button class="choice-btn" data-unit="1">Unit 1</button>
                    <button class="choice-btn" data-unit="2">Unit 2</button>
                    <button class="choice-btn" data-unit="3">Unit 3</button>
                    <button class="choice-btn" data-unit="4">Unit 4</button>
                </div>
            </section>

            <section class="flow-card" id="helpTypeSection" hidden>
                <p class="flow-subtitle">Step 2: Choose what kind of help you want.</p>
                <div class="choice-grid">
                    <button class="choice-btn help-btn" data-mode="breakdown">Break down the assignment</button>
                    <button class="choice-btn help-btn" data-mode="check-errors">Check my code for errors</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const chapterButtons = document.querySelectorAll('[data-unit]');
        const helpButtons = document.querySelectorAll('.help-btn');
        const helpTypeSection = document.getElementById('helpTypeSection');

        let selectedUnit = null;

        chapterButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                selectedUnit = btn.getAttribute('data-unit');
                chapterButtons.forEach((b) => b.classList.remove('selected'));
                btn.classList.add('selected');
                helpTypeSection.hidden = false;
            });
        });

        helpButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                if (!selectedUnit) {
                    alert('Please choose a Unit first.');
                    return;
                }

                const selectedMode = btn.getAttribute('data-mode');
                window.location.href = `/help/${selectedMode}?unit=${encodeURIComponent(selectedUnit)}`;
            });
        });
    </script>
</body>

</html>
